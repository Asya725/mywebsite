<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Details - Alsofties Store</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/boxicons@latest/css/boxicons.min.css"
    />
  </head>
  <body>
    <header>
      <div class="header-inner">
        <a href="Main.html" class="logo">
          <img src="./Image/logo.png" alt="Alsofties Store Logo" />

        <ul class="navmenu">
          <li><a href="Main.html">Home</a></li>
          <li><a href="products.html">Products</a></li>

          <li><a href="Main.html#contact">Contact</a></li>

          <a href="products.html#favorites" aria-label="Favorites">

          <a href="#" aria-label="User">
